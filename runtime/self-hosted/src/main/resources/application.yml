spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cart_and_cook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Server settings
server:
  port: ${PORT:8080}