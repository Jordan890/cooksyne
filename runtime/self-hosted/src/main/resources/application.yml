spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cart_and_cook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080/realms/cart_and_cook}

# Server settings
server:
  port: ${PORT:8081}

cartandcook:
  security:
    config-encryption-key: ${CONFIG_ENCRYPTION_KEY:change-this-in-production}
  runtime:
    db-safe-mode: ${DB_SAFE_MODE:false}
    auto-restart-delay-ms: ${AUTO_RESTART_DELAY_MS:1500}
