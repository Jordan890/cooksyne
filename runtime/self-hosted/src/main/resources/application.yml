spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cart_and_cook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080/realms/cart_and_cook}

# Server settings
server:
  port: ${PORT:8081}

cartandcook:
  security:
    config-encryption-key: ${CONFIG_ENCRYPTION_KEY:change-this-in-production}
  runtime:
    auto-restart-delay-ms: ${AUTO_RESTART_DELAY_MS:1500}
  ai:
    provider: ${AI_PROVIDER:}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llava-phi3}
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
    bedrock:
      region: ${AWS_REGION:us-east-1}
      model-id: ${BEDROCK_MODEL_ID:anthropic.claude-3-haiku-20240307-v1:0}
    huggingface:
      api-key: ${HUGGINGFACE_API_KEY:}
      model: ${HUGGINGFACE_MODEL:Salesforce/blip-image-captioning-large}
