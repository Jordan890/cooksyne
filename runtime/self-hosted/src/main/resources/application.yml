spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/cart_and_cook}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8080/realms/cart_and_cook}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Server settings
server:
  port: ${PORT:8081}
  servlet:
    context-path: ${CONTEXT_PATH:/}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# JWT certificate (base64-encoded X.509 certificate from Keycloak Realm Settings > Keys > RS256 > Certificate)
jwt:
  public-key: ${JWT_PUBLIC_KEY}

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:9090,http://localhost:3000}

# AI — Ollama
cartandcook:
  ai:
    provider: ${AI_PROVIDER:disabled}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      num-ctx: ${OLLAMA_NUM_CTX:2048}
      num-thread: ${OLLAMA_NUM_THREAD:0}
      num-predict: ${OLLAMA_NUM_PREDICT:512}
