# ─────────────────────────────────────────────────────────────────────
# Cart & Cook – Optional Reverse Proxy (nginx)
#
# Use this if you want a single entry point on port 80/443.
# Add this service to docker-compose.yml and remove the port mappings
# from frontend, backend, and keycloak services.
#
#   proxy:
#     image: nginx:alpine
#     ports:
#       - "80:80"
#       - "443:443"
#     volumes:
#       - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
#       # Uncomment for TLS:
#       # - ./certs/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
#       # - ./certs/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
#     depends_on:
#       - frontend
#       - backend
#       - keycloak
# ─────────────────────────────────────────────────────────────────────

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8081;
}

upstream keycloak_upstream {
    server keycloak:8080;
}

server {
    listen 80;
    server_name _;

    # ── Uncomment for TLS ─────────────────────────────────────────────
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Uncomment to redirect HTTP → HTTPS ────────────────────────────
    # if ($scheme = http) {
    #     return 301 https://$host$request_uri;
    # }

    # Frontend (default route)
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend non-API paths (actuator, public, etc.)
    location /actuator/ {
        proxy_pass http://backend_upstream/actuator/;
    }

    location /public/ {
        proxy_pass http://backend_upstream/public/;
    }

    # Keycloak
    location /auth/ {
        proxy_pass http://keycloak_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
