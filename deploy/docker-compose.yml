version: "3.9"

name: cart-and-cook

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cart_and_cook}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-cart_and_cook}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak (custom image with built-in TLS cert) ─────────
  keycloak:
    build:
      context: ./keycloak
      dockerfile: Dockerfile
    image: cart-and-cook/keycloak:latest
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${KC_DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-cart_and_cook}
      KC_DB_USERNAME: ${DB_USERNAME:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      # Use the full frontend URL so Keycloak generates links with the correct scheme
      KC_HOSTNAME: ${KEYCLOAK_FRONTEND_URL:-}
      KC_PROXY: edge
      KC_HTTP_PORT: 8080
      KC_HTTPS_PORT: 8443
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      # Require strict hostname matching so Keycloak emits the configured host/proto
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      # New: modern Keycloak/Quarkus recognizes KC_FRONTEND_URL — forward same value
      KC_FRONTEND_URL: ${KEYCLOAK_FRONTEND_URL:-}
    volumes:
      # Shared volume — entrypoint copies CA cert + truststore here for other containers
      - keycloak_tls:/opt/keycloak/shared-tls
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
      - "${KEYCLOAK_HTTPS_PORT:-8443}:8443"

  # ── Backend API ─────────────────────────────────────────────
  backend:
    image: ghcr.io/jordan890/cart-and-cook-api:${CART_AND_COOK_VERSION:-release}
    restart: unless-stopped
    volumes:
      # Mount Keycloak's CA cert so the JVM can trust it for HTTPS token validation
      - keycloak_tls:/etc/keycloak-tls:ro
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/${DB_NAME:-cart_and_cook}}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-https://keycloak:8443/auth/realms/cart_and_cook}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:9090,http://localhost:3000}
      # Import Keycloak's self-signed CA into the JVM trust store
      JAVA_TOOL_OPTIONS: >-
        -Djavax.net.ssl.trustStore=/etc/keycloak-tls/truststore.jks
        -Djavax.net.ssl.trustStorePassword=changeit
      PORT: 8081
      # AI provider
      CARTANDCOOK_AI_PROVIDER: ${AI_PROVIDER:-ollama}
      CARTANDCOOK_AI_OLLAMA_BASEURL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CARTANDCOOK_AI_OLLAMA_MODEL: ${OLLAMA_MODEL:-llava-phi3}
      CARTANDCOOK_AI_OPENAI_APIKEY: ${OPENAI_API_KEY:-}
      CARTANDCOOK_AI_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      CARTANDCOOK_AI_BEDROCK_REGION: ${AWS_REGION:-us-east-1}
      CARTANDCOOK_AI_BEDROCK_MODELID: ${BEDROCK_MODEL_ID:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      CARTANDCOOK_AI_HUGGINGFACE_APIKEY: ${HUGGINGFACE_API_KEY:-}
      CARTANDCOOK_AI_HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-Salesforce/blip-image-captioning-large}
    ports:
      - "8081:8081"
    depends_on:
      - keycloak
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── Frontend Angular SPA ────────────────────────────────────
  frontend:
    image: ghcr.io/jordan890/cart-and-cook-ui:${CART_AND_COOK_VERSION:-release}
    restart: unless-stopped
    environment:
      API_URL: http://localhost:8081/cart-and-cook/api
      AUTH_AUTHORITY: http://localhost:8080/auth/realms/cart_and_cook
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:-cart-and-cook-ui}
      AUTH_RUNTIME: oidc
    depends_on:
      backend:
        condition: service_healthy

  # ── Caddy Reverse Proxy (custom image with Tailscale) ──────
  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    image: cart-and-cook/caddy-tailscale:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ts_state:/var/run/tailscale
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_HOSTNAME: ${TS_HOSTNAME:-cart-and-cook}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
      - keycloak

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  keycloak_tls:
  ts_state:
