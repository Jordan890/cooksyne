# ─────────────────────────────────────────────────────────────────────
# Cooksyne — Docker Compose Stack
# ─────────────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env   # edit with your values
#   docker compose up -d
#
# See README.md for the full setup guide.
# ─────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cooksyne
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init-keycloak-schema.sql:/docker-entrypoint-initdb.d/init-keycloak-schema.sql:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d cooksyne"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    profiles: ["keycloak"]
    command: start
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/cooksyne
      KC_DB_USERNAME: ${DB_USERNAME:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      KC_DB_SCHEMA: keycloak

      # Admin credentials (first launch only)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}

      # Reverse proxy support — Caddy sends X-Forwarded-* headers
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"

      # Hostname — the full browser-facing URL including /auth.
      # Keycloak runs at root (/) internally. Caddy strips /auth before
      # proxying, and KC_HOSTNAME tells Keycloak to generate external
      # URLs with the /auth prefix.
      KC_HOSTNAME: "https://${DOMAIN:?DOMAIN is required}/auth"

      # Enable health endpoints on management port 9000
      KC_HEALTH_ENABLED: "true"

      # Debug — shows hostname resolution at /auth/realms/master/hostname-debug
      # (via Caddy) or /realms/master/hostname-debug (direct).
      # Remove after setup is complete.
      KC_HOSTNAME_DEBUG: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'",
        ]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────
  backend:
    image: ghcr.io/jordan890/cooksyne-api:${COOKSYNE_VERSION:-release}
    restart: unless-stopped
    # Uncomment to expose directly when not using Caddy:
    # ports:
    #   - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_URL: jdbc:postgresql://postgres:5432/cooksyne
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

      # JWT — static public certificate (no runtime call to auth server)
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required - see README.md}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:?OAUTH2_ISSUER_URI is required - see README.md}

      # Server
      PORT: "8081"
      CONTEXT_PATH: /api
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required - see README.md}

      # AI providers (optional)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}

      # Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-2048}
      OLLAMA_NUM_THREAD: ${OLLAMA_NUM_THREAD:-0}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-512}
      AI_PROVIDER: ${AI_PROVIDER:-ollama}

      # Image storage
      COOKSYNE_STORAGE_IMAGE_DIR: /app/images
    volumes:
      - images:/app/images
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/api/actuator/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ── Frontend UI ─────────────────────────────────────────────────────
  ui:
    image: ghcr.io/jordan890/cooksyne-ui:${COOKSYNE_VERSION:-release}
    restart: unless-stopped
    # Uncomment to expose directly when not using Caddy:
    # ports:
    #   - "3000:80"
    environment:
      API_URL: ${API_URL:?API_URL is required - see README.md}
      AUTH_AUTHORITY: ${AUTH_AUTHORITY:?AUTH_AUTHORITY is required - see README.md}
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:-cooksyne-ui}
      AUTH_RUNTIME: oidc

  # ── Ollama (local AI) ───────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Caddy (Tailscale TLS reverse proxy) ─────────────────────────────
  caddy:
    build: ./caddy
    restart: unless-stopped
    profiles: ["caddy"]
    depends_on:
      - ui
      - backend
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?TS_AUTHKEY is required - see README.md}
      TS_HOSTNAME: ${TS_HOSTNAME:?TS_HOSTNAME is required}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - ts_state:/var/lib/tailscale

volumes:
  pgdata:
  images:
  ollama_data:
  caddy_data:
  caddy_config:
  ts_state:
