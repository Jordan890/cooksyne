# ─────────────────────────────────────────────────────────────────────
# Cart & Cook – Docker Compose (Self-Hosted)
#
# Install:
#   1. Download docker-compose.yml and .env.example
#   2. cp .env.example .env  (edit as needed)
#   3. docker compose up -d
#
# Update:
#   docker compose pull && docker compose up -d
#
# Using external Postgres/Keycloak? Set USE_EXTERNAL_DB=true and/or
# USE_EXTERNAL_KEYCLOAK=true in .env, then provide connection details.
# ─────────────────────────────────────────────────────────────────────

name: cart-and-cook

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    profiles: ["db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-cart_and_cook}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-cart_and_cook}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak ────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    profiles: ["keycloak"]
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${KC_DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-cart_and_cook}
      KC_DB_USERNAME: ${DB_USERNAME:-postgres}
      KC_DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────
  backend:
    image: ghcr.io/jordan890/cart-and-cook-api:${CART_AND_COOK_VERSION:-release}
    restart: unless-stopped
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/${DB_NAME:-cart_and_cook}}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      OAUTH2_ISSUER_URI: ${OAUTH2_ISSUER_URI:-http://keycloak:8080/realms/cart_and_cook}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
      PORT: 8081
      # AI provider (ollama | openai | bedrock | huggingface)
      CARTANDCOOK_AI_PROVIDER: ${AI_PROVIDER:-ollama}
      # ── Ollama
      CARTANDCOOK_AI_OLLAMA_BASEURL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CARTANDCOOK_AI_OLLAMA_MODEL: ${OLLAMA_MODEL:-llava-phi3}
      # ── OpenAI
      CARTANDCOOK_AI_OPENAI_APIKEY: ${OPENAI_API_KEY:-}
      CARTANDCOOK_AI_OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # ── AWS Bedrock
      CARTANDCOOK_AI_BEDROCK_REGION: ${AWS_REGION:-us-east-1}
      CARTANDCOOK_AI_BEDROCK_MODELID: ${BEDROCK_MODEL_ID:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      # ── Hugging Face
      CARTANDCOOK_AI_HUGGINGFACE_APIKEY: ${HUGGINGFACE_API_KEY:-}
      CARTANDCOOK_AI_HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-Salesforce/blip-image-captioning-large}
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/jordan890/cart-and-cook-ui:${CART_AND_COOK_VERSION:-release}
    restart: unless-stopped
    environment:
      API_URL: ${API_URL:-http://localhost:8081}
      AUTH_AUTHORITY: ${AUTH_AUTHORITY:-http://localhost:8080/realms/cart_and_cook}
      AUTH_CLIENT_ID: ${AUTH_CLIENT_ID:-cart-and-cook-ui}
      AUTH_RUNTIME: oidc
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
